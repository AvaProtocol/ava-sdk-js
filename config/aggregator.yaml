environment: development

db_path: /tmp/ap-avs/db-${TEST_ENV}
backup_dir: /tmp/ap-avs-backup-${TEST_ENV}

# Runtime-generated config - secrets injected from GitHub environment
ecdsa_private_key: ${ECDSA_PRIVATE_KEY}

eth_rpc_url: ${ETH_RPC_URL}
eth_ws_url: ${ETH_WS_URL}

rpc_bind_address: "0.0.0.0:2206"
http_bind_address: "0.0.0.0:1323"

avs_registry_coordinator_address: 0xcA95381802FD1398d5BF2D01243210cFb3a2b3BD
operator_state_retriever_address: 0x070E0ABE8407eb4727fC7C5284bdc1e5E5CBf605

jwt_secret: ${JWT_SECRET}

# Optional services configuration
server_name: "aggregator-${TEST_ENV}-ci"
sentry_dsn: ${SENTRY_DSN}

tenderly_account: ${TENDERLY_ACCOUNT}
tenderly_project: ${TENDERLY_PROJECT}
tenderly_access_key: ${TENDERLY_ACCESS_KEY}

# Account abstraction config (Sepolia)
smart_wallet:
  eth_rpc_url: ${ETH_RPC_URL}
  eth_ws_url: ${ETH_WS_URL}
  bundler_url: ${BUNDLER_URL}

  controller_private_key: ${CONTROLLER_PRIVATE_KEY}

  paymaster_address: 0xd856f532F7C032e6b30d76F19187F25A068D6d92

  max_wallets_per_owner: 2000

# Configurable fee rates
fee_rates:
  base_fee_usd: 0.0

  manual_monitoring_fee_usd_per_minute: 0.0
  fixed_time_monitoring_fee_usd_per_minute: 0.000017
  cron_monitoring_fee_usd_per_minute: 0.000033
  block_monitoring_fee_usd_per_minute: 0.000033
  event_monitoring_fee_usd_per_minute: 0.000083

  manual_execution_fee_usd: 0.0
  scheduled_execution_fee_usd: 0.005
  block_execution_fee_usd: 0.01
  event_execution_fee_usd: 0.01

  event_address_fee_usd_per_minute: 0.000008
  event_topic_fee_usd_per_minute: 0.000003

macros:
  secrets:
    ap_notify_bot_token: ${AP_NOTIFY_BOT_TOKEN}
    sendgrid_key: ${SENDGRID_KEY}
    thegraph_api_key: ${THEGRAPH_API_KEY}
    moralis_api_key: ${MORALIS_API_KEY}

notifications:
  summary:
    enabled: true
    provider: context-memory
    api_endpoint: "https://context-api.avaprotocol.org"
    api_key: ${CONTEXT_MEMORY_API_KEY}
