name: E2E Tests

on:
  pull_request:
  workflow_dispatch:
    inputs:
      docker_image_tag:
        description: "Docker Image Tag of avaprotocol/avs-dev"
        required: false
        default: "latest"

# Shared env for all jobs that need secrets
env:
  TEST_ENV: "dev"
  DOCKER_IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.docker_image_tag || 'latest' }}

jobs:
  # ── Job 1: Check if tests should run ──────────────────────────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.resolve.outputs.should_run }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check source or test code changes
        id: check
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }} HEAD)
          SOURCE_PATTERN='^(packages/sdk-js/src|packages/types/src|tests/|config/)'
          MATCHING_FILES=$(echo "$CHANGED_FILES" | grep -E "$SOURCE_PATTERN" || echo "")

          if [ -z "$MATCHING_FILES" ]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "No source/test changes detected, skipping tests"
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            echo "$MATCHING_FILES"
          fi

      - name: Always run for workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        run: echo "should_run=true" >> $GITHUB_OUTPUT
        id: dispatch_check

      # Merge outputs: workflow_dispatch always runs, PR only if source changed
      - name: Resolve should_run
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=${{ steps.check.outputs.should_run || 'true' }}" >> $GITHUB_OUTPUT
          fi

  # ── Job 2: Parallel test suites ───────────────────────────────────
  e2e-tests:
    name: "E2E / ${{ matrix.suite }}"
    needs: setup
    if: needs.setup.outputs.should_run != 'false'
    runs-on: ubuntu-latest
    environment: dev
    strategy:
      fail-fast: false
      matrix:
        suite: [workflows, triggers, executions]

    env:
      # Secrets
      TEST_PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY }}
      ECDSA_PRIVATE_KEY: ${{ secrets.ECDSA_PRIVATE_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      TENDERLY_ACCESS_KEY: ${{ secrets.TENDERLY_ACCESS_KEY }}
      CONTROLLER_PRIVATE_KEY: ${{ secrets.CONTROLLER_PRIVATE_KEY }}
      AP_NOTIFY_BOT_TOKEN: ${{ secrets.AP_NOTIFY_BOT_TOKEN }}
      MORALIS_API_KEY: ${{ secrets.MORALIS_API_KEY }}
      SENDGRID_KEY: ${{ secrets.SENDGRID_KEY }}
      ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}
      ETH_WS_URL: ${{ secrets.ETH_WS_URL }}
      CHAIN_ENDPOINT: ${{ secrets.CHAIN_ENDPOINT }}
      CONTEXT_MEMORY_API_KEY: ${{ secrets.CONTEXT_MEMORY_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      OPERATOR_ECDSA_KEYSTORE: ${{ secrets.OPERATOR_ECDSA_KEYSTORE }}
      OPERATOR_ECDSA_KEY_PASSWORD: ${{ secrets.OPERATOR_ECDSA_KEY_PASSWORD }}
      OPERATOR_BLS_KEYSTORE: ${{ secrets.OPERATOR_BLS_KEYSTORE }}
      OPERATOR_BLS_KEY_PASSWORD: ${{ secrets.OPERATOR_BLS_KEY_PASSWORD }}
      # Variables
      TENDERLY_ACCOUNT: ${{ vars.TENDERLY_ACCOUNT }}
      TENDERLY_PROJECT: ${{ vars.TENDERLY_PROJECT }}
      THEGRAPH_API_KEY: ${{ vars.THEGRAPH_API_KEY }}
      BUNDLER_URL: ${{ vars.BUNDLER_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install

      - name: Build SDK
        run: yarn build

      - name: Inject secrets into aggregator config
        run: |
          export TEST_ENV ETH_RPC_URL ETH_WS_URL ECDSA_PRIVATE_KEY JWT_SECRET BUNDLER_URL CONTROLLER_PRIVATE_KEY TENDERLY_ACCOUNT TENDERLY_PROJECT TENDERLY_ACCESS_KEY AP_NOTIFY_BOT_TOKEN SENDGRID_KEY THEGRAPH_API_KEY MORALIS_API_KEY CONTEXT_MEMORY_API_KEY
          envsubst < config/aggregator.yaml > config/aggregator.runtime.yaml
          echo "Generated config: $(wc -l < config/aggregator.runtime.yaml) lines"
          if grep -q "\${.*}" config/aggregator.runtime.yaml; then
            echo "WARNING: Found unsubstituted variables:"
            grep "\${.*}" config/aggregator.runtime.yaml
          else
            echo "All variables substituted correctly."
          fi

      - name: Inject secrets into operator config
        run: |
          # Write operator key files from secrets
          echo "$OPERATOR_ECDSA_KEYSTORE" > config/operator-ecdsa-key.json
          echo "$OPERATOR_BLS_KEYSTORE" > config/operator-bls-key.json

          # Generate operator runtime config
          export ETH_RPC_URL ETH_WS_URL
          envsubst < config/operator.yaml > config/operator.runtime.yaml
          echo "Generated config: $(wc -l < config/operator.runtime.yaml) lines"
          if grep -q "\${.*}" config/operator.runtime.yaml; then
            echo "WARNING: Found unsubstituted variables:"
            grep "\${.*}" config/operator.runtime.yaml
          else
            echo "All variables substituted correctly."
          fi

      - name: Start aggregator
        run: |
          docker compose up -d aggregator
          echo "Waiting for aggregator to start..."
          sleep 10
          docker compose ps
          docker compose logs aggregator --tail=20

      - name: Wait for aggregator health
        run: |
          max_attempts=24
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            if curl --output /dev/null --silent --fail --max-time 5 http://localhost:1323/up; then
              echo "Aggregator is ready!"
              break
            fi
            echo "Attempt $((attempt + 1))/$max_attempts: not ready yet..."
            docker compose logs aggregator --tail=5
            sleep 5
            attempt=$((attempt + 1))
          done
          if [ $attempt -eq $max_attempts ]; then
            echo "Aggregator failed to start"
            docker compose ps
            docker compose logs aggregator
            exit 1
          fi

      - name: Start operator
        run: |
          docker compose up -d operator
          echo "Waiting for operator to start..."
          sleep 5
          docker compose ps
          docker compose logs operator --tail=20

      - name: Wait for operator health
        run: |
          max_attempts=24
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            if curl --output /dev/null --silent --fail --max-time 5 http://localhost:9010/eigen/node/health; then
              echo "Operator is ready!"
              break
            fi
            echo "Attempt $((attempt + 1))/$max_attempts: operator not ready yet..."
            docker compose logs operator --tail=5
            sleep 5
            attempt=$((attempt + 1))
          done
          if [ $attempt -eq $max_attempts ]; then
            echo "Operator failed to start"
            docker compose ps
            docker compose logs operator
            exit 1
          fi

      - name: Generate AVS API key
        run: |
          API_KEY=$(docker compose exec aggregator /ava create-api-key --config /app/config/aggregator.runtime.yaml --role=admin --subject=apikey 2>/dev/null)
          echo "AVS_API_KEY=$API_KEY" >> $GITHUB_ENV
          echo "API key generated (${#API_KEY} chars)"

      - name: "Run test:${{ matrix.suite }}"
        run: yarn test:${{ matrix.suite }}

  # ── Job 3: Report results ─────────────────────────────────────────
  report:
    name: Report
    needs: [setup, e2e-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## E2E Test Results" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.setup.outputs.should_run }}" = "false" ]; then
            echo "Tests skipped — no source/test changes detected." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          if [ "${{ needs.e2e-tests.result }}" = "success" ]; then
            echo "All test suites passed." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.e2e-tests.result }}" = "skipped" ]; then
            echo "Tests were skipped." >> $GITHUB_STEP_SUMMARY
          else
            echo "Some test suites failed. Check individual job logs for details." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
